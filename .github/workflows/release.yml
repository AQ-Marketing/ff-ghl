name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $VERSION"

      - name: Create ZIP file
        run: |
          set -e

          PLUGIN_DIR="aqm-ghl-connector"
          ZIP_NAME="aqm-ghl-connector.zip"

          rm -rf "$PLUGIN_DIR" "$ZIP_NAME" || true

          if [ ! -f "aqm-ghl-connector.php" ]; then
            echo "ERROR: Plugin file aqm-ghl-connector.php not found!"
            ls -la
            exit 1
          fi

          mkdir -p "$PLUGIN_DIR"

          cp aqm-ghl-connector.php "$PLUGIN_DIR/"
          cp -r includes "$PLUGIN_DIR/"
          cp -r assets "$PLUGIN_DIR/"

          zip -r "$ZIP_NAME" "$PLUGIN_DIR"

          echo "Created $ZIP_NAME with proper WordPress plugin structure"
          echo "ZIP contents:"
          unzip -l "$ZIP_NAME" | head -30

          if unzip -l "$ZIP_NAME" | grep -q "aqm-ghl-connector/aqm-ghl-connector.php"; then
            echo "OK: Correct structure verified"
          else
            echo "ERROR: ZIP structure verification failed!"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: aqm-ghl-connector.zip
          name: Version ${{ steps.get_version.outputs.version }}
          body: |
            ## Version ${{ steps.get_version.outputs.version }}

            Automated release created from tag ${{ github.ref_name }}

            ### Installation
            Download the ZIP file and install via WordPress admin or upload to `/wp-content/plugins/`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
